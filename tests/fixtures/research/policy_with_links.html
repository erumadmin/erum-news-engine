<!DOCTYPE html>
<html lang="ko">
<head><title>물티슈·생리대 등 위생용품 내용량 축소시 소비자에 미리 알린다</title></head>
<body>
  <div class="view_cont">
    <p>앞으로 위생용품의 용량·개수 등을 줄일 경우 제품 포장과 판매장소 등에 3개월 이상 먼저 알리고, 변경 정보를 공개한다.</p>
    <p>공정거래위원회는 14일 한국소비자원, 한국소비자중심기업협회, 위생용품 제조·유통업체 11개사와 협약을 체결했다고
      <a href="https://www.ftc.go.kr/www/bbs/bbsView.do?key=123">보도자료</a>에서 밝혔다.</p>
    <p>단위 사양 축소 정보는 <a href="https://www.price.go.kr/">참가격(www.price.go.kr)</a> 누리집에 공개한다.</p>
    <p>관련 법령은 <a href="https://www.law.go.kr/법령/표시·광고의공정화에관한법률">표시·광고의 공정화에 관한 법률</a>을 참고한다.</p>
    <p><a href="https://www.facebook.com/example">페이스북</a> 공유는 무시 대상.</p>
  </div>

</html>
