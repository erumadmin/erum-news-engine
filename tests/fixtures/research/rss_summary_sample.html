<p>앞으로 위생용품의 용량·개수 등을 줄일 경우 제품 포장과 판매장소 등에 3개월 이상 먼저 알리고, 변경 정보를 공개한다.</p>
<p>공정거래위원회는 14일 한국소비자원, 위생용품 제조·유통업체 11개사와 협약을 체결했다고 밝혔다.</p>
<p>단위 사양 축소 정보는 참가격(www.price.go.kr) 누리집에 공개한다.</p>
