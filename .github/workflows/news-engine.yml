name: News Engine

on:
  schedule:
    - cron: '0 0,2,4,6,8,10,12 * * *'  # KST 9~21시, 2시간 간격 (UTC 기준)
  workflow_dispatch: # 수동 실행 지원

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          WP_IJ_APP_PW: ${{ secrets.WP_IJ_APP_PW }}
          WP_NN_APP_PW: ${{ secrets.WP_NN_APP_PW }}
          WP_CB_APP_PW: ${{ secrets.WP_CB_APP_PW }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: python engine.py
