name: Unit CI (merge-blocking)

on:
  pull_request:
  push:
    branches:
      - main
      - release/news-engine-vnext
      - 'feature/**'

concurrency:
  group: unit-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install runtime deps
        run: pip install -r requirements.txt

      - name: Install pytest (CI only)
        run: pip install pytest

      - name: Run merge-blocking unit tests (no live LLM)
        env:
          # Fail closed for accidental publish in CI helpers
          PUBLISH_STATUS: DRAFT
          REVIEW_ONLY: '1'
        run: python -m pytest tests/ -q --ignore=tests/live
