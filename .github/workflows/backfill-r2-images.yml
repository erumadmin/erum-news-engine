name: Backfill R2 Images

on:
  workflow_dispatch:
    inputs:
      site:
        description: "Target site"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - IJ
          - NN
          - CB
      all_external:
        description: "Backfill every external image URL, not only korea.kr attachments"
        required: false
        default: false
        type: boolean
      limit:
        description: "Maximum matching articles to process"
        required: false
        default: "0"
        type: string

concurrency:
  group: backfill-r2-images
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backfill R2 images
        env:
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          ERUM_API_KEY: ${{ secrets.ERUM_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          args=()
          if [ "${{ inputs.site }}" != "all" ]; then
            args+=(--site "${{ inputs.site }}")
          fi
          if [ "${{ inputs.all_external }}" = "true" ]; then
            args+=(--all-external)
          fi
          if [ "${{ inputs.limit }}" != "0" ]; then
            args+=(--limit "${{ inputs.limit }}")
          fi
          python scripts/backfill_r2_images.py --apply "${args[@]}"
