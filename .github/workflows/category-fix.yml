name: Category Reclassify (NN/CB)

on:
  workflow_dispatch:
    inputs:
      site:
        description: '대상 사이트'
        required: true
        default: 'all'
        type: choice
        options:
          - NN
          - CB
          - all
      stage:
        description: '실행 단계'
        required: true
        default: 'all'
        type: choice
        options:
          - stage1
          - stage2
          - all
      dry_run:
        description: 'Dry run'
        required: false
        default: false
        type: boolean

jobs:
  reclassify:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Upload script to Vultr
        run: |
          sshpass -p '${{ secrets.VULTR_ROOT_PW }}' scp \
            -o StrictHostKeyChecking=no \
            category_reclassify_rest.py \
            root@64.176.227.225:/root/category_reclassify_rest.py

      - name: Run on Vultr
        run: |
          ARGS="--site ${{ inputs.site }} --stage ${{ inputs.stage }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          sshpass -p '${{ secrets.VULTR_ROOT_PW }}' ssh \
            -o StrictHostKeyChecking=no \
            root@64.176.227.225 \
            "pip3 install -q requests && \
             WP_NN_APP_PW='${{ secrets.WP_NN_APP_PW }}' \
             WP_CB_APP_PW='${{ secrets.WP_CB_APP_PW }}' \
             WP_APP_PASSWORD='${{ secrets.WP_APP_PASSWORD }}' \
             GOOGLE_API_KEY='${{ secrets.GOOGLE_API_KEY }}' \
             python3 /root/category_reclassify_rest.py $ARGS"
