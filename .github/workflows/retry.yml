name: Retry Korea.kr Articles

on:
  workflow_dispatch:
    inputs:
      retry_days:
        description: '몇 일 전까지 재시도 (1~7)'
        required: true
        default: '3'

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Retry failed articles
        env:
          RETRY_DAYS: ${{ github.event.inputs.retry_days }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          WP_IJ_URL: ${{ secrets.WP_IJ_URL }}
          WP_IJ_USER: ${{ secrets.WP_IJ_USER }}
          WP_IJ_APP_PW: ${{ secrets.WP_IJ_APP_PW }}
          WP_NN_URL: ${{ secrets.WP_NN_URL }}
          WP_NN_USER: ${{ secrets.WP_NN_USER }}
          WP_NN_APP_PW: ${{ secrets.WP_NN_APP_PW }}
          WP_CB_URL: ${{ secrets.WP_CB_URL }}
          WP_CB_USER: ${{ secrets.WP_CB_USER }}
          WP_CB_APP_PW: ${{ secrets.WP_CB_APP_PW }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: python engine.py
