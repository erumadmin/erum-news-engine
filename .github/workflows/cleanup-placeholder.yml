name: Cleanup Placeholder Posts

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run cleanup script
        run: python cleanup_placeholder_posts.py
        env:
          WP_IJ_APP_PW: ${{ secrets.WP_IJ_APP_PW }}
          WP_NN_APP_PW: ${{ secrets.WP_NN_APP_PW }}
          WP_CB_APP_PW: ${{ secrets.WP_CB_APP_PW }}
