name: Form Bridge (구글폼 → 워드프레스)

on:
  schedule:
    # 매 10분 (KST 9:00~19:00 = UTC 0:00~10:00)
    - cron: '*/10 0-10 * * *'
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  run-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install gspread google-generativeai requests beautifulsoup4

      - name: 브릿지 실행
        run: python form_bridge.py
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          SA_JSON_CONTENT: ${{ secrets.SA_JSON_CONTENT }}
